<!DOCTYPE html>
<html>
<head>
<title>Online Exam</title>

<script>
let leftCount = 0;

document.addEventListener("visibilitychange", function() {

if (document.hidden) {

leftCount++;

alert("Warning! You left the exam tab.");

if(leftCount >= 2){
alert("Exam ended due to tab switching.");
window.location.href="https://google.com";
}

}

});
</script>

</head>

<body>

<h2>Online Exam</h2>

<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSekyn8Fqtah7Qo9zpgWrkC5v_jMb7L1XlChMmn4Oc7fSy8Iyw/viewform?usp=header"
width="100%" height="900"></iframe>

</body>
</html>
