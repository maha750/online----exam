<!DOCTYPE html>
<html>
<head>
<title>Online Exam</title>
<style>
#timer{
position:fixed;
top:10px;
right:20px;
font-size:24px;
font-weight:bold;
color:red;
}
</style>
<script>
let time = 240; // 4 minutes
function startTimer(){
setInterval(function(){
let minutes = Math.floor(time / 60);
let seconds = time % 60;
document.getElementById("timer").innerHTML =
minutes + ":" + (seconds < 10 ? "0" : "") + seconds;
time--;
if(time < 0){
alert("Time is up! Exam ended.");
window.location.href="https://google.com";
}
},1000);
}
document.addEventListener("visibilitychange", function() {
if (document.hidden) {
alert("Exam ended because you left the exam tab.");
window.location.href="https://google.com";
}
});
</script>
</head>
<body onload="startTimer()">
<h2>Online Exam</h2>
<div id="timer">4:00</div>
<iframe src="https://docs.google.com/forms/d/e/1FAIpQLSekyn8Fqtah7Qo9zpgWrkC5v_jMb7L1XlChMmn4Oc7fSy8Iyw/viewform?usp=header"
width="100%" height="900"></iframe>
</body>
</html>
